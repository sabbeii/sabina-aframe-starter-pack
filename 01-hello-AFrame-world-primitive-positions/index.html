<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
     <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-cone position="0 2.85 -3" height="1.0" radius-bottom=".2" rotation="90 0 0" color="orange"></a-cone>
      <a-sphere position="0 2.75 -4" radius=".75" color="fffff"></a-sphere>
      <a-sphere position="0 1.25 -4" radius="1.00" color="fffff"></a-sphere>
      <a-sphere position="0 1.25 -4" radius="1.00" color="fffff"></a-sphere>
      <a-cylinder position="0 3.8 -4" radius="0.5" height=".5" color="black"></a-cylinder>
      <a-cylinder position="0 3.4 -4" radius=".75" height=".05" color="black"></a-cylinder>
      <a-plane position="0 0.1 -4" rotation="-90 0 0" width="4" height="4" color="ffffff"></a-plane>
      <!-- <a-sky color="#ECECEC"></a-sky> -->
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity environment="preset: forest; dressingAmount: 500"></a-entity>
    </a-scene>
  </body>
</html>
